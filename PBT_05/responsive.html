<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">MyShop</div>

        <!-- Hamburger Mobile -->
        <div class="hamburger">☰</div>

        <!-- Menu Desktop -->
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Sale</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h3>Filters</h3>

            <select>
                <option>Category</option>
                <option>Shoes</option>
                <option>Clothes</option>
                <option>Accessories</option>
            </select>

            <select>
                <option>Price</option>
                <option>$0 - $50</option>
                <option>$50 - $100</option>
            </select>
        </aside>

        <!-- PRODUCTS -->
        <main class="products">

            <div class="product-card">
                <img src="https://picsum.photos/300/200?1" alt="product">
                <h3>Product 1</h3>
                <p>$29</p>
                <button>Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/200?2" alt="product">
                <h3>Product 2</h3>
                <p>$35</p>
                <button>Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/200?3" alt="product">
                <h3>Product 3</h3>
                <p>$42</p>
                <button>Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/200?4" alt="product">
                <h3>Product 4</h3>
                <p>$55</p>
                <button>Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/200?5" alt="product">
                <h3>Product 5</h3>
                <p>$65</p>
                <button>Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/200?6" alt="product">
                <h3>Product 6</h3>
                <p>$48</p>
                <button>Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/200?7" alt="product">
                <h3>Product 7</h3>
                <p>$70</p>
                <button>Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/200?8" alt="product">
                <h3>Product 8</h3>
                <p>$88</p>
                <button>Buy Now</button>
            </div>

        </main>

        <!-- ADS -->
        <aside class="ads">
            <h3>Ads</h3>
            <p>Promotion Banner</p>
        </aside>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 MyShop</p>
    </footer>

</body>
</html>
