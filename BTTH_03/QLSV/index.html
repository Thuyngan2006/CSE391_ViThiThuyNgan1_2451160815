<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quản Lý Sinh Viên</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- KHUNG CHỨA TOÀN BỘ -->
    <div class="container">

        <!-- TIÊU ĐỀ -->
        <h1>QUẢN LÝ SINH VIÊN</h1>

        <!-- KHU VỰC NÚT -->
        <div class="top-bar">

            <button id="openModalBtn">
                + Thêm Sinh Viên
            </button>

        </div>

        <!-- THÔNG BÁO -->
        <div id="message">

        </div>

        <!-- THỐNG KÊ -->
        <div class="statistics">

            <div>
                Tổng sinh viên:
                <span id="totalStudents">0</span>
            </div>

            <div>
                Điểm trung bình:
                <span id="avgScore">0</span>
            </div>

        </div>

        <!-- BẢNG SINH VIÊN -->
        <table>

            <thead>

                <tr>

                    <th>Mã SV</th>

                    <th>Họ tên</th>

                    <th>Ngày sinh</th>

                    <th>Lớp</th>

                    <th>Điểm TB</th>

                    <th>Email</th>

                    <th>Hành động</th>

                </tr>

            </thead>

            <!-- DỮ LIỆU ĐỔ RA -->
            <tbody id="studentTableBody">

            </tbody>

        </table>

    </div>

    <!-- POPUP MODAL -->
    <div class="modal" id="studentModal">

        <div class="modal-content">

            <!-- NÚT ĐÓNG -->
            <span class="closeBtn" id="closeModalBtn">
                &times;
            </span>

            <!-- TIÊU ĐỀ FORM -->
            <h2 id="modalTitle">
                Thêm Sinh Viên
            </h2>

            <!-- FORM -->
            <form id="studentForm">

                <input
                    type="text"
                    id="studentId"
                    placeholder="Mã sinh viên"
                >

                <input
                    type="text"
                    id="fullName"
                    placeholder="Họ và tên"
                >

                <input
                    type="date"
                    id="birthDate"
                >

                <input
                    type="text"
                    id="className"
                    placeholder="Lớp học"
                >

                <input
                    type="number"
                    id="score"
                    placeholder="Điểm trung bình"
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                >

                <div class="form-actions">

    <button type="submit" id="submitBtn">
        Lưu Sinh Viên
    </button>

    <button type="button" id="cancelBtn">
        Hủy
    </button>

</div>

            </form>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
