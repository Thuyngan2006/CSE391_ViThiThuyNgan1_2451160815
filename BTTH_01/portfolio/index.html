<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Thuy Ngan</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/skills.css">
    <link rel="stylesheet" href="css/portfolio.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
<!-- HEADER -->
<header>

    <div class="container nav-container">

        <div class="logo">
            Thúy Ngân
        </div>

        <nav>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#contact">Contact</a>
        </nav>

    </div>

</header>

<!-- HERO -->
<section class="hero">

    <h1>
        Hi, I'm Thuy Ngan
    </h1>

    <p>
        Full-Stack Developer | UI Designer | Problem Solver
    </p>

    <a href="#portfolio" class="cta-button">
        View My Work
    </a>

</section>
<!-- ABOUT -->
<section id="about" class="about-section">

    <div class="container about-grid">

        <div class="about-image">

            <img src="images/avatar.jpg" alt="Profile Photo">

        </div>

        <div class="about-content">

            <h2>About Me</h2>

            <p class="lead">
                I'm a passionate developer with 3+ years experience.
            </p>

            <p>
                Specialized in frontend and backend development.
            </p>

        </div>

    </div>

</section>
<!-- SKILLS SECTION -->

    <section id="skills" class="skills-section">

        <div class="container">

            <h2>My Skills</h2>

            <div class="skills-grid">

                <!-- HTML -->

                <div class="skill-item">

                    <div class="skill-top">

                        <span>HTML5</span>

                        <span>95%</span>

                    </div>

                    <div class="skill-bar">

                        <div class="skill-progress html">
                        </div>

                    </div>

                </div>
                <!-- CSS -->

                <div class="skill-item">

                    <div class="skill-top">

                        <span>CSS3</span>

                        <span>90%</span>

                    </div>

                    <div class="skill-bar">

                        <div class="skill-progress css">
                        </div>

                    </div>

                </div>

                <!-- JavaScript -->

                <div class="skill-item">

                    <div class="skill-top">

                        <span>JavaScript</span>

                        <span>85%</span>

                    </div>

                    <div class="skill-bar">

                        <div class="skill-progress javascript">
                        </div>

                    </div>

                </div>

                <!-- React -->

                <div class="skill-item">

                    <div class="skill-top">

                        <span>React</span>

                        <span>80%</span>

                    </div>

                    <div class="skill-bar">

                        <div class="skill-progress react">
                        </div>

                    </div>

                </div>

            </div>

        </div>

</section>
</body>
</html>
